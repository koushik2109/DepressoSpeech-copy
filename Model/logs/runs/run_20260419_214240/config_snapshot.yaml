data:
  train_csv: data/splits/train_split.csv
  dev_csv: data/splits/dev_split.csv
  label_column: PHQ_Score
  id_column: Participant_ID
  batch_size: 32
  max_chunks: 0
  num_workers: 0
  phq_threshold: 10
model:
  input_dim: 384
  feature_mode: text_only
  pooling: stats_direct
  stats_mode: mean
  stats_head_dim: 10
  head:
    dropout: 0.45
  mc_dropout: 0.15
  multitask: false
detailed_labels_csv: data/labels/Detailed_PHQ8_Labels.csv
optimizer:
  type: adamw
  lr: 0.0025
  weight_decay: 0.05
scheduler:
  type: reduce_on_plateau
  factor: 0.5
  patience: 20
  min_lr: 1.0e-06
loss:
  type: combined
  phq_threshold: 10
  high_weight: 2.0
  low_weight: 1.0
  ccc_weight: 1.0
  n_bins: 5
  floor_weight: 0.5
  ceil_weight: 5.0
  multitask_item_weight: 0.1
  multitask_binary_weight: 0.05
regularization:
  entropy_lambda: 0.0
  gate_reg_lambda: 0.0
augmentation:
  depression_threshold: 10.0
  temporal_dropout_rate: 0.0
  feature_noise_std: 0.0
  label_noise_std: 0.0
training:
  epochs: 3000
  gradient_clip_norm: 1.0
  seed: 42
early_stopping:
  patience: 200
  min_delta: 0.001
  metric: ccc
checkpointing:
  save_dir: checkpoints
  model_filename: best_model.pt
  save_every_n_epochs: 0
logging:
  log_dir: logs
  log_every_n_steps: 5
  save_curves: true
