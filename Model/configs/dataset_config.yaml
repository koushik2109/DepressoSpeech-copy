# =============================================================================
# Session 5: Dataset & Sequence Construction Configuration
# =============================================================================

dataset:
  # Feature dimension after fusion (Session 4 output)
  feature_dim: 592
  # Max chunks per subject (0 = no limit)
  max_chunks: 0
  # Label column in split CSVs
  label_column: "PHQ_Score"
  id_column: "Participant_ID"

dataloader:
  batch_size: 8
  num_workers: 0
  pin_memory: true
  # Training loader shuffles, dev/test/inference do not
  train_shuffle: true

# Split file paths
splits:
  train: "data/splits/train_split.csv"
  dev: "data/splits/dev_split.csv"
  test: "data/splits/test_split.csv"
