# =============================================================================
# [LAYER_START] Session 2: Audio Preprocessing Configuration
# =============================================================================

audio:
  # Target sample rate for all audio
  sample_rate: 16000

  # Supported input formats
  supported_formats:
    - ".wav"
    - ".mp3"
    - ".flac"

preprocessing:
  # Voice Activity Detection (VAD)
  vad:
    # Backend: "silero" or "energy"
    backend: "energy"
    # Minimum speech duration to keep (seconds)
    min_speech_duration: 0.3
    # Maximum silence duration to keep (seconds) — preserves short pauses
    max_silence_duration: 0.5
    # Energy threshold (for energy-based VAD, fraction of max energy)
    energy_threshold: 0.02
    # Frame length for VAD analysis (seconds)
    frame_length: 0.03
    # Hop length for VAD analysis (seconds)
    hop_length: 0.01

  # Chunking
  chunking:
    # Chunk duration in seconds
    chunk_duration: 5.0
    # Overlap between chunks (fraction, 0.0 to 0.5)
    overlap: 0.25
    # Minimum chunk duration to keep (seconds) — discard shorter tail chunks
    min_chunk_duration: 2.0
    # Maximum chunks per subject (0 = unlimited)
    # 10 = ~50s of speech, prevents long-audio duration bias
    max_chunks_per_subject: 10

paths:
  # Raw audio directory
  raw_audio_dir: "data/raw"
  # Processed audio output directory
  processed_audio_dir: "data/processed/audio_chunks"
  # Metadata output
  chunk_metadata_dir: "data/processed/chunk_metadata"
