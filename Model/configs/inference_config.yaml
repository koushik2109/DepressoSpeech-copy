# =============================================================================
# Session 8: Inference Pipeline Configuration
# End-to-end: raw audio → PHQ-8 prediction
# =============================================================================

# --- Audio Preprocessing ---
audio:
  sample_rate: 16000

preprocessing:
  vad:
    backend: "energy"
    energy_threshold: 0.02
    frame_length: 0.03
    hop_length: 0.01
    min_speech_duration: 0.3
    max_silence_duration: 0.5
  chunking:
    chunk_duration: 5.0
    overlap: 0.25
    min_chunk_duration: 2.0
    max_chunks_per_subject: 10  # cap prevents duration-length bias

# --- Saved Artifacts (from training) ---
artifacts:
  # Legacy text-only pipeline
  model_path: "checkpoints/best_model.pt"
  normalizer_path: "checkpoints/scalers/feature_scalers.pkl"
  pca_path: "checkpoints/scalers/pca_reducer.pkl"
  # Fusion pipeline
  fusion_checkpoint: "checkpoints/best_fusion.pt"
  text_checkpoint: "checkpoints/best_model.pt"

# --- Pipeline Mode ---
# "fusion" (default) = MultimodalFusion (text + audio + behavioral)
# "text_only" = Legacy text-only DepressionModel
pipeline_mode: "fusion"

# --- Model Architecture (must match training) ---
model:
  input_dim: 384
  feature_mode: "text_only"
  pooling: "stats_direct"
  stats_mode: "mean_std"
  stats_head_dim: 0
  head:
    dropout: 0.0

# --- Inference Settings ---
inference:
  device: "auto" # "auto", "cpu", or "cuda"
  batch_size: 1 # Subjects processed at a time
  deterministic: true # Disable dropout, set eval mode

# --- API Settings ---
api:
  host: "127.0.0.1" # Bind address (0.0.0.0 for public)
  port: 8000
  max_file_size_mb: 100 # Max upload size per file
  max_batch_size: 20 # Max files per batch request
  allowed_extensions: # Accepted audio formats
    - .wav
    - .mp3
    - .flac
    - .ogg
    - .m4a
    - .webm
  cors_origins: # CORS allowed origins (restrict in production)
    - "*"
