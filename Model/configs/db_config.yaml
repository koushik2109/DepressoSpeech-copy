# =========================================================
# Database Configuration
# =========================================================
# Dev: SQLite (default, zero config)
# Prod: Switch url to PostgreSQL connection string

# Connection URL
# SQLite:     sqlite:///data/depresso.db
# PostgreSQL: postgresql://user:pass@localhost:5432/depresso
url: "sqlite:///data/depresso.db"

# Connection pool (PostgreSQL only, ignored for SQLite)
pool_size: 5
max_overflow: 10

# Echo SQL statements (debug only)
echo: false
