# =============================================================================
# Session 3: Feature Extraction Configuration
# Supports both training (CSV) and inference (audio) paths
# =============================================================================

# --- eGeMAPS Configuration ---
egemaps:
  feature_set: "eGeMAPSv02"
  feature_level: "Functionals"
  expected_dim: 88

# --- MFCC Configuration ---
mfcc:
  n_mfcc: 40
  include_deltas: true
  include_delta_deltas: true
  expected_dim: 120 # 40 * 3

# --- Text Embedding Configuration ---
text:
  # Whisper Base for inference transcription
  whisper_model: "openai/whisper-base"
  whisper_size_mb: 139
  # SBERT for encoding (both training and inference)
  sbert_model: "all-MiniLM-L6-v2"
  embedding_dim: 384
  sbert_batch_size: 32
  # Lazy loading - models download on first use
  lazy_load: true

# --- Feature Store Configuration ---
feature_store:
  store_dir: "data/features"
  format: "npz"
  naming: "{participant_id}_{source}.npz"

# --- Total Feature Dimensions ---
total:
  egemaps_dim: 88
  mfcc_dim: 120
  text_dim: 384
  fused_dim: 592 # 88 + 120 + 384

# --- Data Paths (Training) ---
training_data:
  egemaps_csv: "data/raw/egemaps.csv"
  mfcc_csv: "data/raw/mfcc.csv"
  transcript_csv: "data/raw/transcript.csv"
  splits_dir: "data/splits"
