# =============================================================================
# Session 10: Optimized Training Configuration
# 219 train subjects (merged train+dev), validated on 56 test subjects
# Text-only SBERT with regularization fixes for reduced overfitting
# =============================================================================

# --- Data ---
data:
  train_csv: "data/splits/full_train.csv"
  dev_csv: "data/splits/test_split.csv"
  label_column: "PHQ_Score"
  id_column: "Participant_ID"
  batch_size: 32
  max_chunks: 0
  num_workers: 0
  phq_threshold: 10

# --- Model Architecture ---
# SBERT text embeddings (384-dim) → stats pooling → small head
# Keeping model simple to avoid overfitting on 219 subjects
model:
  input_dim: 384
  feature_mode: "text_only"
  pooling: "stats_direct"
  stats_mode: "mean"
  stats_head_dim: 12
  head:
    dropout: 0.35
  mc_dropout: 0.15
  multitask: false

# --- Detailed Labels (per-item PHQ-8) ---
detailed_labels_csv: "data/labels/Detailed_PHQ8_Labels.csv"

# --- Optimizer ---
optimizer:
  type: "adamw"
  lr: 2.0e-3
  weight_decay: 0.15

# --- Scheduler ---
scheduler:
  type: "reduce_on_plateau"
  factor: 0.5
  patience: 15
  min_lr: 1.0e-6

# --- Loss ---
loss:
  type: "combined"
  phq_threshold: 10
  high_weight: 2.0
  low_weight: 1.0
  ccc_weight: 1.0
  n_bins: 5
  floor_weight: 0.5
  ceil_weight: 5.0
  multitask_item_weight: 0.1
  multitask_binary_weight: 0.05

# --- Regularization ---
regularization:
  entropy_lambda: 0.0
  gate_reg_lambda: 0.0

# --- Augmentation ---
# Re-enabled with moderate values to combat overfitting
augmentation:
  depression_threshold: 10.0
  temporal_dropout_rate: 0.10
  feature_noise_std: 0.01
  label_noise_std: 0.15

# --- Training Loop ---
training:
  epochs: 2000
  gradient_clip_norm: 1.0
  seed: 42

# --- Early Stopping ---
early_stopping:
  patience: 60
  min_delta: 0.001
  metric: "ccc"

# --- Checkpointing ---
checkpointing:
  save_dir: "checkpoints"
  model_filename: "best_model.pt"
  save_every_n_epochs: 0

# --- Logging ---
logging:
  log_dir: "logs"
  log_every_n_steps: 5
  save_curves: true
