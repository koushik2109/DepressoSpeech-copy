# =============================================================================
# Session 9: Training Pipeline Configuration
# Text-only features with statistics pooling — CCC > 0.5
# =============================================================================

# --- Data ---
data:
  train_csv: "data/splits/train_split.csv"
  dev_csv: "data/splits/dev_split.csv"
  label_column: "PHQ_Score"
  id_column: "Participant_ID"
  batch_size: 32
  max_chunks: 0
  num_workers: 0
  phq_threshold: 10

# --- Model Architecture ---
# SBERT text embeddings carry ~all depression signal (CCC=0.49 with Ridge).
# Audio features (eGeMAPS/MFCC) add noise and hurt performance.
# Mean+std pooling of text (768 dims) → Linear → best CCC.
model:
  input_dim: 384
  feature_mode: "text_only"
  pooling: "stats_direct"
  stats_mode: "mean"
  stats_head_dim: 12
  head:
    dropout: 0.50
  mc_dropout: 0.15
  multitask: false

# --- Detailed Labels (per-item PHQ-8) ---
detailed_labels_csv: "data/labels/Detailed_PHQ8_Labels.csv"

# --- Optimizer ---
optimizer:
  type: "adamw"
  lr: 2.5e-3
  weight_decay: 0.05

# --- Scheduler ---
scheduler:
  type: "reduce_on_plateau"
  factor: 0.5
  patience: 20
  min_lr: 1.0e-6

# --- Loss ---
# Combined loss: CCC + continuous-weighted MSE for direct metric optimization
loss:
  type: "combined"
  phq_threshold: 10
  high_weight: 2.0
  low_weight: 1.0
  ccc_weight: 1.0
  n_bins: 5
  floor_weight: 0.5
  ceil_weight: 5.0
  multitask_item_weight: 0.1
  multitask_binary_weight: 0.05

# --- Regularization ---
# Disabled — entropy reg was 20% of normalized loss, distorting gradients
regularization:
  entropy_lambda: 0.0
  gate_reg_lambda: 0.0

# --- Augmentation ---
# Disabled for stats_direct — augmentation corrupts feature statistics
augmentation:
  depression_threshold: 10.0
  temporal_dropout_rate: 0.0
  feature_noise_std: 0.0
  label_noise_std: 0.0

# --- Training Loop ---
training:
  epochs: 3000
  gradient_clip_norm: 1.0
  seed: 42

# --- Early Stopping ---
early_stopping:
  patience: 200
  min_delta: 0.001
  metric: "ccc"

# --- Checkpointing ---
checkpointing:
  save_dir: "checkpoints"
  model_filename: "best_model.pt"
  save_every_n_epochs: 0

# --- Logging ---
logging:
  log_dir: "logs"
  log_every_n_steps: 5
  save_curves: true
