# =============================================================================
# Model Architecture Configuration
# Text-only SBERT features with statistics pooling (mean+std → Linear)
# =============================================================================

# --- PCA Reduction (NOT used in text_only mode) ---
pca:
  n_components: 24
  save_path: "checkpoints/scalers/pca_reducer.pkl"

# --- Model Architecture ---
model:
  input_dim: 384 # SBERT text embedding dim
  feature_mode: "text_only" # "text_only" or "all"
  pooling: "stats_direct" # bypass MLP/BiGRU, compute stats directly on input
  stats_mode: "mean_std" # "mean_std" (D*2=768) or "mean_std_min_max" (D*4)
  stats_head_dim: 0 # 0 = Linear(768→1), >0 = MLP head

  head:
    dropout: 0.0
    output_dim: 1

# --- Parameter Budget ---
# StatsPool: 0 params (mean + std, no learnable params)
# Head:      768*1 + 1 = 769 params
# Total:     769 params (ratio 163/769 ≈ 212:1)
