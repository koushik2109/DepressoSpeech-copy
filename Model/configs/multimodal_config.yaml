# =============================================================================
# Multimodal V2 Training Configuration
# HuBERT + SBERT with Gated Fusion, Staged Training
# =============================================================================

# --- Data ---
data:
  train_csv: "data/splits/train_split.csv"
  dev_csv: "data/splits/dev_split.csv"
  label_column: "PHQ_Score"
  id_column: "Participant_ID"
  batch_size: 56          # Full dev set in one batch for stable CCC
  phq_threshold: 10

# --- Model Architecture ---
model:
  text_dim: 384           # SBERT all-MiniLM-L6-v2
  audio_dim: 768          # HuBERT Base
  proj_dim: 32            # Projection dim (small: 163 subjects)
  stats_mode: "mean_std"  # mean+std pooling
  dropout: 0.1
  modality_dropout: 0.15  # Drop entire modality 15% of time during training

# --- Loss ---
loss:
  type: "weighted_mse"
  phq_threshold: 10
  high_weight: 2.0
  low_weight: 1.0

# --- Augmentation ---
augmentation:
  temporal_dropout_rate: 0.1
  feature_noise_std: 0.005
  label_noise_std: 0.15

# --- Staged Training ---
stages:
  # Stage 1: Text-only (audio frozen)
  stage1:
    lr: 5.0e-3
    weight_decay: 0.1
    epochs: 1000
    patience: 200

  # Stage 2: Audio + fusion gate (text frozen)
  stage2:
    lr: 5.0e-3
    weight_decay: 0.05
    epochs: 500
    patience: 100

  # Stage 3: Joint fine-tuning (all unfrozen, reduced LR)
  stage3:
    lr: 1.0e-3
    weight_decay: 0.05
    epochs: 300
    patience: 80

# --- Training Loop ---
training:
  gradient_clip_norm: 1.0
  seed: 42

# --- Checkpointing ---
checkpointing:
  save_dir: "checkpoints"

# --- Logging ---
logging:
  log_dir: "logs"
