# =============================================================================
# Session 4: Feature Normalization & Fusion Configuration
# =============================================================================

# --- Normalization ---
normalization:
  # StandardScaler for eGeMAPS and MFCC (fit on train only)
  egemaps:
    method: "standard" # z-score: (x - mean) / std
  mfcc:
    method: "standard"
  text:
    method: "l2" # L2 normalization (SBERT outputs are already ~unit norm)
    l2_normalize: true

# --- Fusion ---
fusion:
  # Concatenation order: [eGeMAPS | MFCC | Text]
  order:
    - egemaps
    - mfcc
    - text_embeddings
  fused_dim: 592 # 88 + 120 + 384

# --- Scaler Persistence ---
scaler:
  save_dir: "checkpoints/scalers"
  filename: "feature_scalers.pkl"
