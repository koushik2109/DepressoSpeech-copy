# =============================================================================
# Session 10: Logging Configuration
# Controls log levels, formats, and output for all scripts.
# =============================================================================

# --- Log Directories ---
log_dir: "logs" # Base directory for all log files

# --- Log Files (created per script) ---
# These are the default filenames; each script writes to its own file:
#   training.log          — scripts/train.py
#   feature_extraction.log — scripts/extract_features.py
#   inference.log         — scripts/predict.py
#   api_server.log        — scripts/serve.py

# --- Log Levels ---
console_level: "INFO" # Console output level (INFO, DEBUG, WARNING)
file_level: "DEBUG" # File output level (captures everything)


# --- Structured Prefixes ---
# All log messages use prefixes for easy grep/filter:
#   [TRAINING_PATH]    — training loop events, epoch progress, LR changes
#   [INFERENCE_PATH]   — inference pipeline events, prediction results
#   [DATA_FLOW]        — data loading, feature shapes, dimension traces
#   [VALIDATION_CHECK] — input validation warnings, missing files
#   [TIMING]           — per-stage performance timers
#   [API]              — REST API request/response events
#   [CHECKPOINT]       — model/artifact save/load events, run management
